{% set version = "1.0.5" %}

package:
  name: emperor
  version: {{ version }}

source:
  fn: emperor-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/e/emperor/emperor-{{ version }}.tar.gz
  sha256: efc8d37cecc559dae3f0ab2fec45d0d91eb198872fac98ecc4df59d3a14cc96c

build:
  number: 0
  skip: true  # [win]
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
  host:
    - python
    - scipy >=0.17.0
    - future
    - jinja2
    - scikit-bio
    - numpy
    - pandas
    - click
    - setuptools
    - pip

  run:
    - python
    - scipy >=0.17.0
    - future
    - jinja2
    - scikit-bio
    - numpy >=1.7
    - pandas
    - click
    - setuptools

test:
  imports:
    - emperor  # [ not (linux and py2k)]
    - emperor.qiime_backports  # [ not (linux and py2k)]

about:
  home: http://emperor.microbio.me
  license: BSD-3-Clause
  license_file: LICENSE.md
  summary: Emperor a tool for the analysis and visualization of large microbial ecology datasets

extra:
  recipe-maintainers:
    - ElDeveloper
